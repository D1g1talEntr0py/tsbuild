name: TypeScript Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        typescript-version: ['5.6.3', '5.7', '5.8', '5.9', '6.0']
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D typescript@${{ matrix.typescript-version }} --save-exact
      - run: npx tsc --version
      - run: pnpm test
