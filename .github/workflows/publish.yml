name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: sudo npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - id: semantic_release
        run: npx -y -p semantic-release -p @semantic-release/commit-analyzer -p @semantic-release/release-notes-generator -p @semantic-release/changelog -p @semantic-release/npm -p @semantic-release/exec -p @semantic-release/git -p @semantic-release/github -p conventional-changelog-conventionalcommits semantic-release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: backfill_release
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('node:child_process');

            const tag = execSync('git describe --tags --abbrev=0', { encoding: 'utf8' }).trim();
            core.info(`Latest tag at/behind HEAD: ${tag}`);

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Release for ${tag} already exists.`);
              core.setOutput('created', 'false');
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            core.warning(`Release for ${tag} is missing. Creating it now.`);

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: false,
            });

            core.setOutput('created', 'true');

      - name: Fail when semantic-release failed without recovery
        if: steps.semantic_release.outcome == 'failure' && steps.backfill_release.outputs.created != 'true'
        run: |
          echo "semantic-release failed and no missing GitHub release was recovered."
          exit 1
